models:
  Conference:
    name:string
    description: string
    start_date: datetime
    end_date: datetime
    status: string
    region: string
    venue_isd: unsignedInteger
    relationships:
     belongsTo: Venue
     beolongsToMany: Speaker, Talk

  Venue:
    name: string
    city: string
    country: string
    postal_code: string
    relationships:
     hasMany: Conference

  Speaker:
    name: string
    email: string
    bio: text
    twitter_handle:string
    relationships:
     beolongsToMany: Conference

  Talk:
   title: string
   abstract: text
   relationships: Speaker
    belongsTo: Speaker
    beolongsToMany: Conference
